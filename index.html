<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <!-- ✅ 모바일 화면 비율 맞추기 -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>유아 디지털 시계 학습</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- 홈 화면 -->
  <div id="home" class="page home-page">
    <h1>유아 디지털 시계 학습</h1>

    <!-- h2와 아이콘을 같은 줄에 배치 -->
    <div class="title-row">
      <h2>재미있게 배우는 5단계 학습</h2>
      <div id="clock-icon" class="clock-icon">⏰</div>
    </div>

    <div class="menu">
      <button onclick="startStage(1)">1단계: 시 학습</button>
      <button onclick="startStage(2)">2단계: 분 학습</button>
      <button onclick="startStage(3)">3단계: 시, 분 학습</button>
      <button onclick="startStage(4)">4단계: 정답 찾기</button>
      <button onclick="startStage(5)">5단계: 시계 맞추기</button>
    </div>
  </div>

  <!-- 학습 단계 화면 -->
  <div id="stage" class="page hidden">
    <h1 id="stage-main-title"></h1>
    <h2 id="stage-subtitle"></h2>

    <!-- 학습 콘텐츠 영역 -->
    <div class="quiz-container">
      <div id="clockDisplay"></div>
      <div id="options"></div>
    </div>

    <div id="speaker-icon"></div>

    <!-- 3단계용 그리드 -->
    <div id="stage3" class="grid-container hidden"></div>

    <!-- 네비게이션 화살표 -->
    <div class="nav-arrows">
      <div id="prevArrow" class="arrow left"></div>
      <div id="nextArrow" class="arrow right"></div>
    </div>
  
    <!-- 홈으로 돌아가기 -->
    <div id="home-icon" onclick="goHome()">🏠</div>
  </div>

  <script src="app.js"></script>
</body>
</html>
